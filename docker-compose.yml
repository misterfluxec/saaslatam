version: '3.8'

services:
  # Dashboard HotSpot SaaS - Next.js
  dashboard:
    image: mx126kvohqtqiknxu0znm4lk:e96b88dfc51b790ed3ae34993b6d8113e2885c90
    container_name: hotspot-dashboard
    restart: unless-stopped
    networks:
      - coolify
      - hotspot-network
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - COOLIFY_URL=https://app.labodegaec.com
      - COOLIFY_FQDN=app.labodegaec.com
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hotspot-dashboard.rule=Host(`app.labodegaec.com`)"
      - "traefik.http.routers.hotspot-dashboard.entrypoints=websecure"
      - "traefik.http.routers.hotspot-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.hotspot-dashboard.loadbalancer.server.port=80"
      - "coolify.service.name=dashboard"
      - "coolify.service.type=web"

networks:
  coolify:
    external: true
  hotspot-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
