version: '3.8'

services:
  # Dashboard HotSpot SaaS - Next.js
  dashboard:
    image: mx126kvohqtqiknxu0znm4lk:56239507d99c2311332e744f51d53a1fd00b7f76
    container_name: hotspot-dashboard
    restart: unless-stopped
    networks:
      coolify:
        ipv4_address: 10.0.1.100
      hotspot-network:
        ipv4_address: 172.20.0.100
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://hotspot_admin:hotspot_admin@10.0.1.2:5432/hotspot_db
      - COOLIFY_URL=https://app.labodegaec.com
      - COOLIFY_FQDN=app.labodegaec.com
    command: >
      sh -c "
        npm run build &&
        npm start
      "
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hotspot-dashboard.rule=Host(`app.labodegaec.com`)"
      - "traefik.http.routers.hotspot-dashboard.entrypoints=websecure"
      - "traefik.http.routers.hotspot-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.hotspot-dashboard.loadbalancer.server.port=3000"
      - "coolify.service.name=dashboard"
      - "coolify.service.type=web"

networks:
  coolify:
    external: true
  hotspot-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
